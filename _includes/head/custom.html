<link rel="shortcut icon" type="image/png" href="/assets/images/favicon.png">
<link rel="apple-touch-icon" href="/assets/images/favicon.png">
<link rel="stylesheet" href="{{ '/assets/css/site.css' | relative_url }}">
<link rel="alternate" type="application/json" href="{{ '/api/research.json' | absolute_url }}" title="Academic research data">
<link rel="alternate" type="application/json" href="{{ '/api/publications.json' | absolute_url }}" title="Academic publications data">
<link rel="alternate" type="application/json" href="{{ '/api/knowledge-graph.json' | absolute_url }}" title="Academic knowledge graph">
<link rel="alternate" type="text/plain" href="{{ '/llms.txt' | absolute_url }}" title="LLM-readable site summary">

{% if page.schema %}
<script type="application/ld+json">
{{ page.schema | jsonify }}
</script>
{% endif %}

{% if page.url == "/" %}
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@graph": [
    {
      "@type": "Person",
      "@id": "{{ site.url }}/#person",
      "name": {{ site.data.research.profile.name | jsonify }},
      "givenName": {{ site.data.research.profile.givenName | jsonify }},
      "familyName": {{ site.data.research.profile.familyName | jsonify }},
      "jobTitle": {{ site.data.research.profile.title | jsonify }},
      "description": {{ site.data.research.profile.bio | jsonify }},
      "url": {{ site.url | jsonify }},
      "image": "{{ site.url }}{{ site.author.avatar }}",
      "email": "mailto:{{ site.data.research.profile.email }}",
      "sameAs": {{ site.social.links | jsonify }},
      "knowsAbout": {{ site.data.research.profile.researchAreas | jsonify }},
      "worksFor": {
        "@type": "Organization",
        "name": {{ site.data.research.profile.organization | jsonify }}
      },
      {% assign primary_education = site.data.research.profile.education | first %}
      "alumniOf": {
        "@type": "EducationalOrganization",
        "name": {{ primary_education.institution | jsonify }}
      },
      "homeLocation": {
        "@type": "Place",
        "name": {{ site.data.research.profile.location | jsonify }}
      },
      "mainEntityOfPage": {
        "@type": "WebPage",
        "@id": "{{ site.url }}/"
      }
    },
    {
      "@type": "WebSite",
      "@id": "{{ site.url }}/#website",
      "name": {{ site.title | jsonify }},
      "url": {{ site.url | jsonify }},
      "description": {{ site.description | jsonify }},
      "publisher": {
        "@id": "{{ site.url }}/#person"
      }
    },
    {
      "@type": "ItemList",
      "@id": "{{ site.url }}/#featured-research",
      "name": "Featured research projects",
      "itemListElement": [
        {% for project in site.data.research.researchProjects %}
        {
          "@type": "ListItem",
          "position": {{ forloop.index }},
          "item": {
            "@type": "ScholarlyArticle",
            "name": {{ project.title | jsonify }},
            "headline": {{ project.title | jsonify }},
            "description": {{ project.breakthrough | jsonify }},
            "datePublished": "{{ project.year }}",
            "about": {{ project.tags | jsonify }},
            "url": "{{ project.url | absolute_url }}"
          }
        }{% unless forloop.last %},{% endunless %}
        {% endfor %}
      ]
    }
  ]
}
</script>
{% endif %}
