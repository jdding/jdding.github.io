name: Validate site

on:
  push:
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ruby/setup-ruby@v1
        with:
          bundler-cache: true
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - run: bundle exec jekyll build
      - run: python3 scripts/validate_site.py
